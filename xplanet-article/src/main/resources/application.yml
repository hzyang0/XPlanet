server:
  port: 8081
  tomcat:
    threads:
      max: 400
      min-spare: 50
    accept-count: 200

spring:
  application:
    name: xplanet-article
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/xplanet?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PWD:root123}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 5000
      idle-timeout: 600000

  redis:
    host: ${REDIS_HOST:localhost}
    port: 6379
    password: ${REDIS_PWD:}

rocketmq:
  name-server: ${ROCKETMQ_NS:localhost:9876}
  producer:
    group: xplanet-article-producer
    send-message-timeout: 3000
    retry-times-when-send-failed: 2

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-not-delete-value: 0
      logic-delete-value: 1
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.xplanet: info
    org.apache.rocketmq: warn