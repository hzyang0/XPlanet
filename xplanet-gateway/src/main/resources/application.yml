server:
  port: 8080

spring:
  application:
    name: xplanet-gateway
  redis:
    host: ${REDIS_HOST:localhost}
    port: 6379

  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: article
          uri: http://${ARTICLE_HOST:localhost}:8081
          predicates:
            - Path=/api/article/**
          filters:
            # IP 维度令牌桶限流: 每秒 100 个,突发 200
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                key-resolver: "#{@ipKeyResolver}"

        - id: like
          uri: http://${INTERACTION_HOST:localhost}:8082
          predicates:
            - Path=/api/like/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 200
                redis-rate-limiter.burstCapacity: 400
                key-resolver: "#{@ipKeyResolver}"

        - id: user
          uri: http://${USER_HOST:localhost}:8083
          predicates:
            - Path=/api/user/**

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics,gateway
