brokerClusterName = DefaultCluster
brokerName = broker-a
brokerId = 0
deleteWhen = 04
fileReservedTime = 48
brokerRole = ASYNC_MASTER
flushDiskType = ASYNC_FLUSH
namesrvAddr = rocketmq-namesrv:9876
autoCreateTopicEnable = true

# 关键:broker 向 namesrv 注册的地址。
# 本地混合模式(应用在宿主机跑)用 127.0.0.1;
# 若应用也在 Docker 里,改成 host.docker.internal 或宿主机实际 IP。
brokerIP1 = 127.0.0.1
