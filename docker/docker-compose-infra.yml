version: "3.8"

# 基础设施一键起(本地混合模式:中间件用 Docker,应用用 IDE 跑)
# 用法: docker compose -f docker/docker-compose-infra.yml up -d
#
# 含 MySQL / Redis / RocketMQ(namesrv + broker)。

services:
  mysql:
    image: mysql:8.0
    container_name: xp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: xplanet
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ../sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - xp-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: xp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - xp-redis-data:/data

  rocketmq-namesrv:
    image: apache/rocketmq:4.9.7
    container_name: xp-rmq-namesrv
    restart: unless-stopped
    ports:
      - "9876:9876"
    command: sh mqnamesrv

  rocketmq-broker:
    image: apache/rocketmq:4.9.7
    container_name: xp-rmq-broker
    restart: unless-stopped
    depends_on:
      - rocketmq-namesrv
    ports:
      - "10909:10909"
      - "10911:10911"
    # 关键:挂载 broker.conf 指定 brokerIP1,否则 broker 向 namesrv
    # 注册的是容器内网 IP,本机应用拿到后连不上 → 发消息超时/收不到消息。
    volumes:
      - ./broker.conf:/home/rocketmq/rocketmq-4.9.7/conf/broker.conf:ro
    command: sh mqbroker -n rocketmq-namesrv:9876 -c /home/rocketmq/rocketmq-4.9.7/conf/broker.conf

volumes:
  xp-mysql-data:
  xp-redis-data:
